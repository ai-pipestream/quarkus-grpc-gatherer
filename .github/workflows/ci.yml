name: CI/Snapshot

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
  MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
  GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
  GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build and Test
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 14

  validate-publish:
    name: Validate Publishing Configuration
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate publish configuration
        env:
          MAVEN_CENTRAL_USERNAME: "dummy"
          MAVEN_CENTRAL_PASSWORD: "dummy"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Validating publish configuration..."
          ./gradlew tasks --all | grep -E "publishAggregationToCentralPortalSnapshots" || exit 1
          ./gradlew tasks --all | grep -E "publishAllPublicationsToGitHubPackagesRepository" || exit 1
          ./gradlew :gradle-plugin:tasks --all | grep -E "publishAllPublicationsToCentralPortalSnapshots" || exit 1
          ./gradlew :gradle-plugin:tasks --all | grep -E "publishAllPublicationsToGitHubPackagesRepository" || exit 1
          echo "✓ Required publish tasks are available (root + gradle-plugin)"
          grep -q "GitHubPackages" build.gradle || exit 1
          grep -q "GitHubPackages" gradle-plugin/build.gradle || exit 1
          echo "✓ GitHub Packages repository is configured (root + gradle-plugin)"
          grep -q "nmcpAggregation" build.gradle || exit 1
          grep -q "com.gradleup.nmcp" gradle-plugin/build.gradle || exit 1
          echo "✓ nmcp is configured (aggregation in root, single in gradle-plugin)"
          ./gradlew verifyAllNoSnapshotDeps --no-daemon || exit 1
          echo "✓ No snapshot dependencies on any publishable runtime classpath"
          echo "✓ Publish configuration is valid"

  publish-snapshots:
    name: Publish Snapshots
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Publish Snapshots to Maven Central (runtime + deployment)
        run: ./gradlew publishAggregationToCentralPortalSnapshots --no-daemon --stacktrace -x test

      - name: Publish Snapshots to Maven Central (gradle-plugin)
        run: ./gradlew :gradle-plugin:publishAllPublicationsToCentralPortalSnapshots --no-daemon --stacktrace -x test

      - name: Publish Snapshots to GitHub Packages (runtime + deployment)
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository --no-daemon --stacktrace -x test

      - name: Publish Snapshots to GitHub Packages (gradle-plugin)
        run: ./gradlew :gradle-plugin:publishAllPublicationsToGitHubPackagesRepository --no-daemon --stacktrace -x test
