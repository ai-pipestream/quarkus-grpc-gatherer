name: Release

on:
  workflow_dispatch:
    inputs:
      incrementer:
        description: 'Version increment type'
        required: true
        default: 'incrementPatch'
        type: choice
        options:
          - incrementPatch
          - incrementMinor
          - incrementMajor

env:
  MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
  MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
  GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
  GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build and Test
        run: ./gradlew build --no-daemon

      # Maven Central rejects releases whose POMs reference SNAPSHOT
      # dependencies, so we must enforce that BEFORE cutting the release tag.
      # axion-release's own snapshotDependencies check is broken under
      # Gradle 9 + Quarkus (it eagerly evaluates a Provider that resolves
      # Quarkus internal Copy configurations, which throw "Resolution of the
      # configuration ... was attempted without an exclusive lock"), so we
      # use a custom verifyAllNoSnapshotDeps task in the root build that
      # walks only the publishable subprojects' compile/runtime classpaths
      # plus the gradle-plugin composite build. axion-release's verifyRelease
      # is then skipped via -x verifyRelease in the createRelease step
      # below; the protection it would have provided lives here instead.
      - name: Verify no snapshot dependencies
        run: ./gradlew verifyAllNoSnapshotDeps --no-daemon --stacktrace

      - name: Create Release Tag
        run: ./gradlew createRelease -Prelease.incrementer=${{ inputs.incrementer }} -Prelease.disableChecks -x verifyRelease

      # gradle-plugin lives in a composite-included build whose own
      # build.gradle reads version from -PquarkusGrpcGathererVersion (default
      # 0.1.0-SNAPSHOT). axion-release bumps the parent build's version but
      # cannot reach into the composite, so we have to capture the bumped
      # version ourselves AFTER createRelease and forward it on every
      # :gradle-plugin: invocation. Without this, the gradle-plugin uploads
      # itself as 0.1.0-SNAPSHOT to the Central Portal release endpoint and
      # gets rejected with "The version cannot be a SNAPSHOT".
      - name: Capture release version
        id: version
        run: |
          VERSION=$(./gradlew -q currentVersion --no-daemon | grep 'Project version' | awk '{print $3}')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version captured: ${VERSION}"

      - name: Publish runtime + deployment to Maven Central
        run: ./gradlew publishAggregationToCentralPortal --no-daemon --stacktrace -x test

      - name: Publish gradle-plugin to Maven Central
        run: ./gradlew :gradle-plugin:publishAllPublicationsToCentralPortal -PquarkusGrpcGathererVersion=${{ steps.version.outputs.version }} --no-daemon --stacktrace -x test

      - name: Publish runtime + deployment to GitHub Packages
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository --no-daemon --stacktrace -x test

      - name: Publish gradle-plugin to GitHub Packages
        run: ./gradlew :gradle-plugin:publishAllPublicationsToGitHubPackagesRepository -PquarkusGrpcGathererVersion=${{ steps.version.outputs.version }} --no-daemon --stacktrace -x test

      - name: Push Release Tag
        run: |
          git push origin main
          git push --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          generate_release_notes: true
