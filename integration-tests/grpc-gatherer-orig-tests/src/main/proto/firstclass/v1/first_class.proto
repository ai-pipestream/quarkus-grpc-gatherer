syntax = "proto3";

package ai.pipestream.firstclass.v1;

import "google/protobuf/any.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_package = "ai.pipestream.firstclass.v1";
option java_outer_classname = "FirstClassProto";

message FirstClassRequest {
  string id = 1;
  google.protobuf.Timestamp occurred_at = 2;
  google.protobuf.Struct payload = 3;
  google.protobuf.Any envelope = 4;
}

message FirstClassReply {
  string status = 1;
}

service FirstClassService {
  rpc Process(FirstClassRequest) returns (FirstClassReply);
}
