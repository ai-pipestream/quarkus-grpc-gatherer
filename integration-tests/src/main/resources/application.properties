quarkus.grpc-gather.enabled=true

# Source 1: GIT.
# Pull a single well-known proto from the OpenSearch proto repo at tag 1.3.0.
# protos/schemas/common.proto is self-contained (no imports), so we don't
# need to fetch any siblings for it to compile.
quarkus.grpc-gather.git-repo=https://github.com/opensearch-project/opensearch-protobufs.git
quarkus.grpc-gather.git-ref=1.3.0
quarkus.grpc-gather.git-subdir=protos
quarkus.grpc-gather.git-paths=schemas/common.proto

# Source 2: JAR DEPENDENCY.
# Pull every .proto file out of the io.grpc:grpc-services artifact (which
# is already declared as a runtime dep in build.gradle) and let grpc-zero
# regenerate the Java classes from them. NOTE: grpc-services also ships
# the precompiled classes for these protos, so we accept the small risk
# of class duplication for now. If this causes Quarkus indexer errors in
# practice, we'll switch to a self-authored proto-only fixture jar.
quarkus.grpc-gather.jar-dependencies=io.grpc:grpc-services

# Descriptor set generation - proves the gatherer + grpc-zero pipeline also
# produces a FileDescriptorSet for runtime proto reflection consumers.
# grpc-zero writes services.dsc into its generated-sources directory, and
# the Gradle processResources task routes it onto the classpath at
# META-INF/grpc/services.dsc (see build.gradle).
quarkus.generate-code.grpc.descriptor-set.generate=true
quarkus.generate-code.grpc.descriptor-set.name=services.dsc

quarkus.log.category."ai.pipestream.grpc.gatherer".level=DEBUG
