quarkus.grpc-gather.enabled=true
quarkus.grpc-gather.clean-target=false
quarkus.grpc-gather.filesystem-dirs=filesystem=${user.dir}/integration-tests/src/test-files
quarkus.grpc-gather.filesystem-scan-root=${user.dir}/integration-tests
# quarkus.grpc-gather.jar-dependencies=io.grpc:grpc-services
quarkus.grpc-gather.git-repo=https://github.com/opensearch-project/opensearch-protobufs.git
quarkus.grpc-gather.git-ref=1.3.0
quarkus.grpc-gather.git-subdir=protos
quarkus.grpc-gather.git-paths=services/search_service.proto
quarkus.grpc-gather.include-google-wkt=true

# Rely on the gatherer's init() to inject quarkus.grpc.codegen.proto-directory

# quarkus.grpc-gather.descriptor-set.generate=true
# quarkus.grpc-gather.descriptor-set.output-dir=${user.dir}/integration-tests/build/grpc-descriptors
# quarkus.grpc-gather.descriptor-set.name=services.dsc

# Force skip of standard gRPC codegen (if it were here, but we use grpc-zero)
# quarkus.grpc.codegen.skip=true

# Not needed for gRPC-only tests
#quarkus.http.port=0
#quarkus.http.test-port=0

quarkus.log.category."ai.pipestream.grpc.gatherer".level=DEBUG
