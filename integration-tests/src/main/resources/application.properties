quarkus.grpc-gather.enabled=true
quarkus.grpc-gather.clean-target=false
quarkus.grpc-gather.filesystem-dirs=${user.dir}/integration-tests/src/test-files
quarkus.grpc-gather.jar-dependencies=io.grpc:grpc-services
quarkus.grpc-gather.git-repo=https://github.com/opensearch-project/opensearch-protobufs.git
quarkus.grpc-gather.git-ref=1.3.0
quarkus.grpc-gather.git-subdir=protos
quarkus.grpc-gather.git-paths=services/search_service.proto
quarkus.grpc-gather.buf-module=buf.build/googleapis/googleapis
quarkus.grpc-gather.buf-paths=google/type/date.proto

quarkus.generate-code.grpc.descriptor-set.generate=true
quarkus.generate-code.grpc.descriptor-set.output-dir=${user.dir}/integration-tests/build/grpc-descriptors
quarkus.generate-code.grpc.descriptor-set.name=services.dsc

quarkus.http.port=0
quarkus.http.test-port=0
