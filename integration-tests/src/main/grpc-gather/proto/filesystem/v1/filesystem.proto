syntax = "proto3";

package filesystem.v1;

import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_package = "filesystem.v1";
option java_outer_classname = "FilesystemProto";

message FileRequest {
  string path = 1;
  google.protobuf.Timestamp seen_at = 2;
}

message FileReply {
  bool exists = 1;
}

service FileSystemService {
  rpc Stat(FileRequest) returns (FileReply);
}
